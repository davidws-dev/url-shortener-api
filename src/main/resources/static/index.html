<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener · David Silva</title>
    <meta name="description" content="Demo de encurtador de URLs — API REST com Spring Boot, PostgreSQL e Docker." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: 'Sora', sans-serif;
          background: #0a0a0b;
          color: #e8e6e1;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 2rem 1rem;
        }

        .bg-grid {
          position: fixed; inset: 0;
          background-image:
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none; z-index: 0;
        }

        .bg-glow {
          position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
          width: 600px; height: 250px;
          background: radial-gradient(ellipse, rgba(99,102,241,0.1) 0%, transparent 70%);
          pointer-events: none; z-index: 0;
        }

        .wrapper { position: relative; z-index: 1; width: 100%; max-width: 560px; }

        .badge {
          display: inline-flex; align-items: center; gap: 6px;
          background: rgba(99,102,241,0.1); border: 0.5px solid rgba(99,102,241,0.3);
          color: #a5b4fc; font-family: 'JetBrains Mono', monospace;
          font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-bottom: 1.25rem;
        }
        .dot { width: 6px; height: 6px; background: #6366f1; border-radius: 50%; animation: pulse 2s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        h1 {
          font-size: 2.2rem; font-weight: 600; letter-spacing: -0.04em;
          color: #f5f4f0; line-height: 1.15; margin-bottom: 0.4rem;
        }
        h1 span { color: #6366f1; }

        .subtitle {
          font-family: 'JetBrains Mono', monospace; font-size: 12px;
          color: #4a4947; margin-bottom: 2rem;
        }

        .tab-row { display: flex; gap: 4px; margin-bottom: 1rem; }
        .tab {
          padding: 6px 16px; border-radius: 6px;
          font-family: 'JetBrains Mono', monospace; font-size: 11px;
          cursor: pointer; border: 0.5px solid transparent;
          color: #5a5855; background: transparent; transition: all 0.15s;
        }
        .tab.active { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }
        .tab:hover:not(.active) { color: #a8a5a0; border-color: rgba(255,255,255,0.08); }

        .card {
          background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1);
          border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem;
        }

        .section-label {
          font-family: 'JetBrains Mono', monospace; font-size: 10px;
          color: #5a5855; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.75rem;
        }

        .input-row { display: flex; gap: 8px; }

        input[type="text"], input[type="url"] {
          flex: 1; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.12);
          border-radius: 8px; padding: 11px 14px; color: #e8e6e1;
          font-family: 'JetBrains Mono', monospace; font-size: 13px;
          outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: rgba(99,102,241,0.5); }
        input::placeholder { color: #3a3836; }

        .btn-primary {
          background: #6366f1; border: none; border-radius: 8px;
          padding: 11px 20px; color: #fff;
          font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
          cursor: pointer; transition: background 0.15s, transform 0.1s;
          white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }
        .btn-primary:hover { background: #5254cc; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #2a2a2e; color: #555; cursor: not-allowed; transform: none; }

        .btn-sm {
          background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.1);
          border-radius: 6px; padding: 5px 12px; color: #888581;
          font-family: 'JetBrains Mono', monospace; font-size: 11px;
          cursor: pointer; transition: all 0.15s;
        }
        .btn-sm:hover { background: rgba(255,255,255,0.1); color: #e8e6e1; }

        .result-box, .error-box { display: none; margin-top: 0.75rem; border-radius: 8px; padding: 12px 14px; }
        .result-box { background: rgba(99,102,241,0.08); border: 0.5px solid rgba(99,102,241,0.25); }
        .error-box {
          background: rgba(239,68,68,0.07); border: 0.5px solid rgba(239,68,68,0.25);
          font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #f87171;
        }
        .result-box.show, .error-box.show { display: block; }

        .result-url {
          font-family: 'JetBrains Mono', monospace; font-size: 14px;
          color: #a5b4fc; word-break: break-all; margin-bottom: 8px;
        }
        .result-meta { display: flex; align-items: center; justify-content: space-between; }
        .result-meta-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #5a5855; }
        .result-actions { display: flex; gap: 6px; }

        .info-grid {
          display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.75rem;
        }
        .info-grid.show { display: grid; }
        .info-item {
          background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.07);
          border-radius: 8px; padding: 10px 12px;
        }
        .info-item.full { grid-column: 1 / -1; }
        .info-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #5a5855; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
        .info-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #c8c6c2; word-break: break-all; }

        .panel { display: none; }
        .panel.active { display: block; }

        .spinner {
          width: 14px; height: 14px; display: none;
          border: 2px solid rgba(255,255,255,0.15); border-top-color: #fff;
          border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
          margin-top: 2rem; padding-top: 1.25rem;
          border-top: 0.5px solid rgba(255,255,255,0.07);
          display: flex; align-items: center; justify-content: space-between;
        }
        .footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #3a3836; }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a {
          font-family: 'JetBrains Mono', monospace; font-size: 11px;
          color: #5a5855; text-decoration: none; transition: color 0.15s;
        }
        .footer-links a:hover { color: #a5b4fc; }

        .toast {
          position: fixed; bottom: 24px; right: 24px;
          background: #18181b; border: 0.5px solid rgba(99,102,241,0.3);
          color: #a5b4fc; font-family: 'JetBrains Mono', monospace;
          font-size: 12px; padding: 9px 16px; border-radius: 8px;
          opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        .swagger-row {
          display: flex; align-items: center; gap: 8px; margin-top: 0.5rem;
        }
        .swagger-badge {
          display: inline-flex; align-items: center; gap: 5px;
          background: rgba(134,239,172,0.08); border: 0.5px solid rgba(134,239,172,0.2);
          color: #86efac; font-family: 'JetBrains Mono', monospace;
          font-size: 11px; padding: 4px 10px; border-radius: 6px;
          text-decoration: none; transition: background 0.15s;
        }
        .swagger-badge:hover { background: rgba(134,239,172,0.14); }

        @media (max-width: 480px) {
          h1 { font-size: 1.7rem; }
          .input-row { flex-direction: column; }
          .btn-primary { justify-content: center; }
          .footer { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<main class="wrapper">

    <div class="badge"><div class="dot"></div> Spring Boot 3.4 · PostgreSQL · Docker</div>
    <h1>URL <span>Shortener</span></h1>
    <p class="subtitle">// REST API · davidws.pt · portfolio project</p>

    <div class="tab-row">
        <button class="tab active" onclick="switchTab('shorten', this)">POST /shorten</button>
        <button class="tab" onclick="switchTab('info', this)">GET /info</button>
    </div>

    <!-- SHORTEN PANEL -->
    <div id="panel-shorten" class="panel active">
        <div class="card">
            <div class="section-label">URL original</div>
            <div class="input-row">
                <input type="url" id="url-input" placeholder="https://exemplo.com/artigo-muito-longo" />
                <button class="btn-primary" id="shorten-btn" onclick="shortenUrl()">
                    <span id="shorten-label">Encurtar</span>
                    <div class="spinner" id="shorten-spinner"></div>
                </button>
            </div>
            <div class="result-box" id="shorten-result">
                <div class="result-url" id="result-url-text"></div>
                <div class="result-meta">
                    <span class="result-meta-label">código gerado com sucesso</span>
                    <div class="result-actions">
                        <button class="btn-sm" onclick="copyResult()">copiar</button>
                        <button class="btn-sm" onclick="openResult()">abrir ↗</button>
                    </div>
                </div>
            </div>
            <div class="error-box" id="shorten-error"></div>
        </div>

        <div class="swagger-row">
            <a class="swagger-badge" href="/swagger-ui/index.html" target="_blank">⬡ Swagger UI</a>
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#3a3836;">documentação completa da API</span>
        </div>
    </div>

    <!-- INFO PANEL -->
    <div id="panel-info" class="panel">
        <div class="card">
            <div class="section-label">Short code</div>
            <div class="input-row">
                <input type="text" id="code-input" placeholder="AbC123" maxlength="20" />
                <button class="btn-primary" id="info-btn" onclick="getInfo()">
                    <span id="info-label">Consultar</span>
                    <div class="spinner" id="info-spinner"></div>
                </button>
            </div>
            <div class="info-grid" id="info-grid">
                <div class="info-item full">
                    <div class="info-label">URL original</div>
                    <div class="info-value" id="info-original">—</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Criado em</div>
                    <div class="info-value" id="info-created">—</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Acessos</div>
                    <div class="info-value" id="info-count">—</div>
                </div>
                <div class="info-item full">
                    <div class="info-label">Expira em</div>
                    <div class="info-value" id="info-expires">—</div>
                </div>
            </div>
            <div class="error-box" id="info-error"></div>
        </div>
    </div>

    <footer class="footer">
        <span class="footer-left">© 2026 David Silva</span>
        <div class="footer-links">
            <a href="https://www.davidws.pt" target="_blank">portfólio</a>
            <a href="https://github.com/davidws-dev" target="_blank">github</a>
            <a href="https://linkedin.com/in/davidws-dev" target="_blank">linkedin</a>
        </div>
    </footer>

</main>

<div class="toast" id="toast">URL copiada!</div>

<script>
    const BASE_URL = window.location.origin + '/api/v1/urls';
    let lastShortUrl = '';

    function switchTab(name, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
    }

    function setLoading(id, on) {
      const btn = document.getElementById(id + '-btn');
      const label = document.getElementById(id + '-label');
      const spinner = document.getElementById(id + '-spinner');
      btn.disabled = on;
      label.style.display = on ? 'none' : 'inline';
      spinner.style.display = on ? 'block' : 'none';
    }

    function normalizeUrl(url) {
      url = url.trim();
      if (!url) return '';
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        return 'https://' + url;
      }
      return url;
    }

    async function shortenUrl() {
      let url = document.getElementById('url-input').value.trim();
      const resultBox = document.getElementById('shorten-result');
      const errorBox = document.getElementById('shorten-error');
      resultBox.classList.remove('show');
      errorBox.classList.remove('show');

      if (!url) {
        errorBox.textContent = 'Insira uma URL.';
        errorBox.classList.add('show');
        return;
      }

      url = normalizeUrl(url);

      setLoading('shorten', true);
      try {
        const res = await fetch(BASE_URL + '/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ originalUrl: url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erro ' + res.status);
        lastShortUrl = data.shortUrl;
        document.getElementById('result-url-text').textContent = lastShortUrl;
        resultBox.classList.add('show');
      } catch (e) {
        let msg = e.message;
        if (msg.includes('fetch') || msg.includes('Failed to fetch')) {
          msg = 'Não foi possível conectar ao servidor. Certifique-se que a aplicação está rodando.';
        }
        errorBox.textContent = msg;
        errorBox.classList.add('show');
      }
      setLoading('shorten', false);
    }

    async function getInfo() {
      const code = document.getElementById('code-input').value.trim();
      const grid = document.getElementById('info-grid');
      const errorBox = document.getElementById('info-error');
      grid.classList.remove('show');
      errorBox.classList.remove('show');

      if (!code) {
        errorBox.textContent = 'Insira o short code.';
        errorBox.classList.add('show');
        return;
      }

      setLoading('info', true);
      try {
        const res = await fetch(BASE_URL + '/' + code + '/info');
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Código não encontrado.');
        document.getElementById('info-original').textContent = data.originalUrl || '—';
        document.getElementById('info-created').textContent = data.createdAt ? new Date(data.createdAt).toLocaleString('pt-PT') : '—';
        document.getElementById('info-count').textContent = data.accessCount ?? '—';
        document.getElementById('info-expires').textContent = data.expiresAt ? new Date(data.expiresAt).toLocaleString('pt-PT') : 'Sem expiração';
        grid.classList.add('show');
      } catch (e) {
        errorBox.textContent = e.message;
        errorBox.classList.add('show');
      }
      setLoading('info', false);
    }

    function copyResult() {
      if (!lastShortUrl) return;
      navigator.clipboard.writeText(lastShortUrl).catch(() => {});
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function openResult() {
      if (lastShortUrl) window.open(lastShortUrl, '_blank');
    }

    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
    document.getElementById('code-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') getInfo();
    });
</script>
</body>
</html>
